<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Enterprise — Documentation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090d;
  --surface: #111318;
  --surface2: #181b23;
  --card: #1c1f2a;
  --border: #252838;
  --border-l: #333750;
  --primary: #7c6cff;
  --primary-dim: rgba(124,108,255,.08);
  --primary-glow: rgba(124,108,255,.15);
  --pl: #a599ff;
  --success: #34d399;
  --success-dim: rgba(52,211,153,.08);
  --warn: #fbbf24;
  --warn-dim: rgba(251,191,36,.06);
  --danger: #f87171;
  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,.08);
  --text: #e8eaf0;
  --text-s: #a0a6b8;
  --text-m: #6b7280;
  --rail-w: 76px;
  --top-h: 52px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.65; overflow:hidden; height:100vh; }

/* ═══ TOP BAR ═══ */
.topbar {
  position:fixed; top:0; left:0; right:0; height:var(--top-h); z-index:100;
  background:rgba(8,9,13,.85); backdrop-filter:blur(20px); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 20px; gap:16px;
}
.topbar .logo { display:flex; align-items:center; gap:10px; width:var(--rail-w); justify-content:center; }
.topbar .logo svg { width:28px; height:28px; }
.topbar .logo-text { font-weight:700; font-size:14px; letter-spacing:-.3px; color:var(--pl); }
.topbar .spacer { flex:1; }
.lang-toggle { display:flex; gap:2px; background:var(--surface2); border-radius:8px; padding:2px; }
.lang-btn { padding:4px 14px; border-radius:6px; border:none; background:none; color:var(--text-m); font-size:12px; font-family:inherit; cursor:pointer; transition:.2s; }
.lang-btn.active { background:var(--primary); color:#fff; }

/* ═══ NAVIGATION RAIL (M3 style) ═══ */
.rail {
  position:fixed; left:0; top:var(--top-h); bottom:0; width:var(--rail-w); z-index:90;
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:8px 0; overflow-y:auto;
  scrollbar-width:none;
}
.rail::-webkit-scrollbar { display:none; }
.rail-group { padding:4px 0; }
.rail-group + .rail-group { border-top:1px solid var(--border); margin-top:4px; }
.rail-label { font-size:8px; text-transform:uppercase; letter-spacing:.8px; color:var(--text-m); text-align:center; padding:6px 4px 2px; font-weight:600; }
.rail-item {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:8px 4px 6px; margin:1px 6px; border-radius:12px; cursor:pointer;
  transition:all .2s; position:relative; text-decoration:none; color:var(--text-m);
}
.rail-item:hover { background:var(--primary-dim); color:var(--text-s); }
.rail-item.active { background:var(--primary-glow); color:var(--pl); }
.rail-item.active::before {
  content:''; position:absolute; left:-6px; top:50%; transform:translateY(-50%);
  width:3px; height:20px; background:var(--primary); border-radius:0 3px 3px 0;
}
.rail-icon { font-size:18px; line-height:1; }
.rail-text { font-size:8.5px; font-weight:500; text-align:center; line-height:1.2; max-width:64px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ═══ MAIN CONTENT ═══ */
.main {
  position:fixed; left:var(--rail-w); top:var(--top-h); right:0; bottom:0;
  overflow-y:auto; padding:32px 40px 80px; scroll-behavior:smooth;
}
.main::-webkit-scrollbar { width:6px; }
.main::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

.page { display:none; max-width:860px; animation:fadeIn .3s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ═══ CONTENT ELEMENTS ═══ */
.page-title { font-size:28px; font-weight:700; letter-spacing:-.5px; margin-bottom:4px; }
.page-sub { font-size:14px; color:var(--text-s); margin-bottom:28px; }

.section { margin-bottom:28px; }
.section-head {
  font-size:15px; font-weight:600; padding-left:12px; margin-bottom:12px;
  border-left:3px solid var(--primary); color:var(--text);
}

/* Design Intent */
.intent {
  border:1px solid rgba(251,191,36,.12); background:var(--warn-dim);
  border-radius:12px; margin:16px 0; overflow:hidden;
}
.intent-head {
  display:flex; align-items:center; gap:8px; padding:12px 16px;
  cursor:pointer; font-size:13px; font-weight:600; color:var(--warn); user-select:none;
}
.intent-head::after { content:'▾'; margin-left:auto; font-size:10px; transition:.2s; }
.intent.closed .intent-head::after { transform:rotate(-90deg); }
.intent-body { padding:0 16px 14px; font-size:13px; color:var(--text-s); line-height:1.75; }
.intent.closed .intent-body { display:none; }

/* Cards */
.card {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  overflow:hidden; margin:14px 0;
}
.card-head {
  background:var(--surface2); padding:10px 16px; border-bottom:1px solid var(--border);
  font-size:12px; font-weight:600; display:flex; align-items:center; gap:8px;
}
.card-body { padding:16px; }

/* Annotations */
.note {
  display:flex; align-items:flex-start; gap:10px; border-radius:10px;
  padding:12px 16px; margin:12px 0; font-size:12.5px; line-height:1.6;
}
.note.info { background:var(--primary-dim); border:1px solid rgba(124,108,255,.15); }
.note.ok { background:var(--success-dim); border:1px solid rgba(52,211,153,.15); }
.note.warn { background:var(--warn-dim); border:1px solid rgba(251,191,36,.15); }
.note.tip { background:var(--cyan-dim); border:1px solid rgba(34,211,238,.15); }
.note-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
.note-text { flex:1; }
.note-text strong { color:var(--text); }

/* Code */
.code {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; font-family:'JetBrains Mono',monospace; font-size:11.5px;
  color:var(--text-s); white-space:pre-wrap; margin:8px 0; overflow-x:auto; line-height:1.7;
}

/* Flow chain */
.flow { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin:10px 0; }
.flow-node {
  padding:6px 12px; border-radius:8px; font-size:11px; font-weight:600;
  border:1px solid var(--border); background:var(--surface2); text-align:center;
}
.flow-node.p { background:var(--primary-dim); border-color:rgba(124,108,255,.3); color:var(--pl); }
.flow-node.s { background:var(--success-dim); border-color:rgba(52,211,153,.3); color:var(--success); }
.flow-node.c { background:var(--cyan-dim); border-color:rgba(34,211,238,.3); color:var(--cyan); }
.flow-node.d { background:rgba(248,113,113,.06); border-color:rgba(248,113,113,.2); color:var(--danger); }
.flow-arrow { color:var(--text-m); font-size:12px; }

/* Steps */
.steps { margin:12px 0; }
.step-item {
  display:flex; gap:10px; margin-bottom:8px; font-size:12.5px;
}
.step-num {
  width:22px; height:22px; border-radius:50%; background:var(--primary);
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:700; flex-shrink:0; margin-top:1px;
}
.step-text { color:var(--text-s); flex:1; }

/* Tables */
.tbl { width:100%; border-collapse:collapse; font-size:12px; margin:8px 0; }
.tbl th { text-align:left; padding:8px 10px; color:var(--text-m); font-size:10px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); font-weight:600; }
.tbl td { padding:8px 10px; border-bottom:1px solid rgba(37,40,56,.6); }
.tbl tr:nth-child(even) td { background:rgba(255,255,255,.01); }

/* Badges */
.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; }
.badge.green { background:rgba(52,211,153,.12); color:var(--success); }
.badge.yellow { background:rgba(251,191,36,.12); color:var(--warn); }
.badge.blue { background:rgba(124,108,255,.12); color:var(--pl); }
.badge.cyan { background:rgba(34,211,238,.12); color:var(--cyan); }

/* Stats grid */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:12px 0; }
.stat { text-align:center; padding:12px; background:var(--surface2); border-radius:10px; border:1px solid var(--border); }
.stat-v { font-size:22px; font-weight:700; }
.stat-l { font-size:9px; color:var(--text-m); margin-top:2px; }

/* Separator */
.sep { border-top:1px solid var(--border); margin:20px 0; }

/* Grid helpers */
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* Technical Deep Dive */
.deep {
  border:1px solid rgba(124,108,255,.15); background:rgba(124,108,255,.03);
  border-radius:12px; margin:20px 0; overflow:hidden;
}
.deep-head {
  display:flex; align-items:center; gap:8px; padding:12px 16px;
  cursor:pointer; font-size:13px; font-weight:600; color:var(--pl); user-select:none;
  background:rgba(124,108,255,.05);
}
.deep-head::after { content:'▸ expand'; margin-left:auto; font-size:10px; font-weight:400; color:var(--text-m); transition:.2s; }
.deep.open .deep-head::after { content:'▾ collapse'; }
.deep-body { display:none; padding:16px; font-size:12.5px; color:var(--text-s); line-height:1.7; }
.deep.open .deep-body { display:block; }
.deep-body h4 { color:var(--pl); font-size:13px; margin:14px 0 6px; font-weight:600; }
.deep-body h4:first-child { margin-top:0; }
.deep-body .code { font-size:10.5px; }
.deep-body .tbl { font-size:11px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="var(--primary)" stroke-width="2"/><path d="M10 16l4 4 8-8" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>

  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>

  </div>
</div>

<!-- NAVIGATION RAIL -->
<nav class="rail" id="rail"></nav>

<!-- MAIN CONTENT -->
<div class="main" id="main"></div>

<script>
let lang = 'en';
let activePage = 'arch';

// ═══ NAVIGATION STRUCTURE ═══
const NAV = [
  { group: { en: 'Start', zh: '开始' }, items: [
    { id:'arch', icon:'🏗', en:'Architecture', zh:'架构' },

  { group: { en: 'Admin', zh: '管理' }, items: [

    { id:'settings', icon:'⚙', en:'Settings', zh:'设置' },
  ]},
  { group: { en: 'Employee', zh: '员工' }, items: [
    { id:'portal-chat', icon:'💭', en:'Chat', zh:'对话' },
    { id:'portal-im', icon:'📱', en:'Connect IM', zh:'连接IM' },
    { id:'portal-profile', icon:'👤', en:'Profile', zh:'档案' },
    { id:'portal-skills', icon:'🔧', en:'My Skills', zh:'技能' },
    { id:'portal-usage', icon:'📈', en:'My Usage', zh:'用量' },
    { id:'portal-twin', icon:'👻', en:'Twin', zh:'分身' },
  ]},
  { group: { en: 'Reference', zh: '参考' }, items: [
    { id:'troubleshoot', icon:'🔧', en:'Fix Issues', zh:'故障排除' },
    { id:'costs', icon:'💵', en:'Costs', zh:'成本' },
  ]},
];

// ═══ PAGE CONTENT ═══
const PAGES = {
arch: {
  en: { title:'Architecture Overview', sub:'The multi-layer pipeline that routes every message to the right agent.' },
  zh: { title:'架构总览', sub:'将每条消息路由到正确 Agent 的多层管道。' },
  body() {
    return intent(
      'OpenClaw Enterprise uses a <strong>shared gateway + isolated microVM</strong> architecture. All employees share one EC2 instance for receiving messages, but each gets their own Firecracker microVM in AgentCore — with their own SOUL, memory, and permissions. Cost efficiency of shared infra, security of complete isolation.',
      'OpenClaw 企业版采用<strong>共享网关 + 隔离微虚拟机</strong>架构。所有员工共享一个 EC2 实例接收消息，但每个人在 AgentCore 中拥有自己的 Firecracker 微虚拟机 — 拥有自己的 SOUL、记忆和权限。兼顾共享成本效率和完全隔离安全性。'
    )
    + sectionHead(t('Complete Data Flow','完整数据流'))
    + card(t('Message Journey: IM → AI Response','消息旅程：IM → AI 响应'),
      flow(['IM Platform','','Gateway\n18789','p','H2 Proxy\n8091','c','Tenant Router\n8090','s','AgentCore VM','d','Bedrock',''])
      + `<div class="sep"></div>`
      + `<div class="grid2" style="font-size:11px;color:var(--text-s)">`
      + `<div><strong style="color:var(--pl)">Gateway</strong> — ${t('Receives IM webhooks (Feishu, Telegram, Discord, Slack). Manages bot connections via WebSocket/polling.','接收 IM webhook（飞书、Telegram、Discord、Slack）。通过 WebSocket/轮询管理 bot 连接。')}</div>`
      + `<div><strong style="color:var(--cyan)">H2 Proxy</strong> — ${t('Intercepts all Bedrock API calls from Gateway. Handles IM pairing (/start → BIND). Enforces employee binding check. Routes to Tenant Router.','拦截 Gateway 的所有 Bedrock API 调用。处理 IM 配对（/start → BIND）。强制员工绑定检查。路由到 Tenant Router。')}</div>`
      + `<div><strong style="color:var(--success)">Tenant Router</strong> — ${t('Resolves IM user ID → employee → position → AgentCore Runtime. Derives stable tenant_id for session persistence. Manages routing config from DynamoDB.','解析 IM 用户 ID → 员工 → 岗位 → AgentCore 运行时。派生稳定的 tenant_id 用于会话持久化。从 DynamoDB 管理路由配置。')}</div>`
      + `<div><strong style="color:var(--danger)">AgentCore</strong> — ${t('Isolated Firecracker microVM per employee. workspace_assembler merges 3-layer SOUL from S3/DynamoDB. Full OpenClaw instance with tools, skills, memory.','每员工独立 Firecracker 微虚拟机。workspace_assembler 从 S3/DynamoDB 合并三层 SOUL。完整 OpenClaw 实例，含工具、技能、记忆。')}</div>`
      + `</div>`
    )
    + sectionHead(t('SOUL 3-Layer Identity Model','SOUL 三层身份模型'))
    + flow(['🔒 Global\n'+t('Company rules','公司规则'),'d','✏️ Position\n'+t('Role expertise','角色专长'),'p','✏️ Personal\n'+t('Preferences','个人偏好'),'s','= Merged SOUL\n'+t('What agent reads','Agent 读取内容'),'c'])
    + note('info','📊',t(
      '<strong>Key principle:</strong> 1000 employees share one Feishu bot. Each message is routed to the correct employee\'s isolated AgentCore VM. The agent knows who it is, what tools it has, and what knowledge base to use — all assembled at session start.',
      '<strong>核心原则：</strong>1000 名员工共享一个飞书 bot。每条消息路由到正确员工的隔离 AgentCore VM。Agent 知道自己是谁、有什么工具、用什么知识库 — 全部在会话开始时组装。'
    ))
    + sectionHead(t('Environment Variable Propagation','环境变量传播'))
    + flow(['.env','','deploy.sh','p','/etc/openclaw/env','s','systemd services','c','AgentCore env','d'])
    + note('tip','💡',t(
      '<strong>All config is variable-driven.</strong> STACK_NAME, AWS_REGION, DYNAMODB_TABLE, S3_BUCKET flow from .env through every component. No hardcoded environment names — deploy to any account/region.',
      '<strong>所有配置由变量驱动。</strong>STACK_NAME、AWS_REGION、DYNAMODB_TABLE、S3_BUCKET 从 .env 流经每个组件。无硬编码环境名 — 可部署到任何账号/区域。'
    ))
    + sectionHead(t('Serverless vs Always-on','Serverless vs Always-on'))
    + `<table class="tbl"><tr><th></th><th>${t('Serverless (Default)','Serverless（默认）')}</th><th>${t('Always-on (Fargate)','Always-on（Fargate）')}</th></tr>`
    + `<tr><td>${t('Cold start','冷启动')}</td><td>~6s ${t('first message','首次消息')}</td><td>${t('None — instant','无 — 即时')}</td></tr>`
    + `<tr><td>${t('Cost','成本')}</td><td>${t('Pay per session','按会话付费')}</td><td>${t('~$50/month per container','每容器约 $50/月')}</td></tr>`

deploy: {
  en: { title:'Deploy with deploy.sh', sub:'One-command deployment — infrastructure, Docker, data, services.' },
  zh: { title:'使用 deploy.sh 部署', sub:'一键部署 — 基础设施、Docker、数据、服务。' },
  body() {
    return intent(
      'A single <code>bash deploy.sh</code> handles everything: CloudFormation infrastructure, Docker image build on EC2, AgentCore runtime creation, data seeding, and service installation. <strong>No manual steps. ~15 minutes for a fresh deployment.</strong>',
      '一条 <code>bash deploy.sh</code> 搞定所有：CloudFormation 基础设施、EC2 上 Docker 镜像构建、AgentCore 运行时创建、数据种子和服务安装。<strong>无需手动步骤。全新部署约 15 分钟。</strong>'

    + `<tr><td>Python</td><td><code>python3 --version</code></td><td>>= 3.10</td></tr>`
    + `<tr><td>SSM Plugin</td><td><code>session-manager-plugin</code></td><td>${t('Latest','最新')}</td></tr>`
    + `<tr><td>AWS Credentials</td><td><code>aws sts get-caller-identity</code></td><td>${t('Must succeed','必须成功')}</td></tr></table>`
    + sectionHead(t('Quick Start','快速开始'))
    + `<div class="code">cd enterprise\ncp .env.example .env\n# ${t('Edit: STACK_NAME, REGION, ADMIN_PASSWORD','编辑：STACK_NAME, REGION, ADMIN_PASSWORD')}\nbash deploy.sh</div>`
    + sectionHead(t('.env Configuration','.env 配置'))
    + `<table class="tbl"><tr><th>${t('Variable','变量')}</th><th>${t('Required','必填')}</th><th>${t('Default','默认')}</th><th>${t('Notes','说明')}</th></tr>`
    + `<tr><td><code>STACK_NAME</code></td><td>✅</td><td>openclaw</td><td>${t('Names all resources. Unique per account/region.','命名所有资源。每账号/区域唯一。')}</td></tr>`
    + `<tr><td><code>REGION</code></td><td>✅</td><td>us-east-1</td><td>${t('Any region with Bedrock + AgentCore','任何有 Bedrock + AgentCore 的区域')}</td></tr>`
    + `<tr><td><code>ADMIN_PASSWORD</code></td><td>✅</td><td>—</td><td>${t('Shared login password','共享登录密码')}</td></tr>`
    + `<tr><td><code>MODEL</code></td><td></td><td>global.amazon.nova-2-lite-v1:0</td><td>${t('Bedrock model ID','Bedrock 模型 ID')}</td></tr>`

soul: { en:{title:'SOUL Editor — 3-Layer Identity',sub:'Global → Position → Personal = what agent reads.'}, zh:{title:'SOUL 编辑器 — 三层身份',sub:'全局 → 岗位 → 个人 = Agent 读取的内容。'}, body(){ return intent('SOUL defines <strong>who the agent is</strong>. Three layers: Global (company constitution, IT-locked), Position (department handbook, dept-managed), Personal (desk setup, employee-editable). Each layer adds specificity without overriding the one above.','SOUL 定义<strong>Agent 是谁</strong>。三层：全局（公司章程，IT 锁定）、岗位（部门手册，部门管理）、个人（办公桌布置，员工可编辑）。每层增加具体性而不覆盖上层。') + flow(['🔒 Global\n'+t('IT locked','IT 锁定'),'d','✏️ Position\n'+t('Dept managed','部门管理'),'p','✏️ Personal\n'+t('Employee edits','员工编辑'),'s','= Merged\n'+t('Agent reads','Agent 读取'),'c']) + note('info','📍',t('<strong>Global:</strong> Security Center → Policies → Edit Global SOUL<br><strong>Position:</strong> Organization → Positions → click → SOUL tab<br><strong>Personal:</strong> Agent Factory → click agent → Personal tab','<strong>全局：</strong>Security Center → Policies → Edit Global SOUL<br><strong>岗位：</strong>Organization → Positions → 点击 → SOUL 标签<br><strong>个人：</strong>Agent Factory → 点击 Agent → Personal 标签'))
+ deep(`
<h4>S3 Storage Structure</h4>
<div class="code">s3://{bucket}/
├── _shared/soul/global/SOUL.md          ← Layer 1: Global (IT-locked)
├── _shared/soul/positions/{pos_id}/SOUL.md  ← Layer 2: Position
└── {emp_id}/workspace/SOUL.md           ← Layer 3: Personal
    └── .personal_soul_backup.md         ← Anti-snowball backup</div>

<h4>Assembly Code: workspace_assembler.py → merge_soul()</h4>
<p>OpenClaw reads ONE file: <code>SOUL.md</code>. We produce it by concatenating three layers with HTML comment markers and <code>---</code> separators:</p>
<div class="code">&lt;!-- LAYER: GLOBAL (locked by IT — do not modify) --&gt;
**CRITICAL IDENTITY OVERRIDE: You are a digital employee of ACME Corp...**
{global_soul}

---

&lt;!-- LAYER: POSITION (managed by department admin) --&gt;
{position_soul}

---

&lt;!-- LAYER: PERSONAL (employee preferences) --&gt;
{personal_soul}</div>
<p>If any layer is missing, it's simply omitted. If all are missing: <code>"You are a helpful AI assistant."</code></p>

<h4>Anti-Snowball: .personal_soul_backup.md</h4>
<p><strong>Problem:</strong> Without protection, assembly reads the already-merged SOUL.md as the "personal" layer on session 2+, causing it to grow exponentially (global+pos+personal → becomes new personal → gets global+pos added again).</p>
<p><strong>Solution:</strong> On first assembly, save original personal SOUL to <code>.personal_soul_backup.md</code>. All subsequent assemblies read from backup, never the merged version.</p>
<div class="code"># First session:
read SOUL.md (personal only) → save to .personal_soul_backup.md → merge

# Session N (N≥2):
read .personal_soul_backup.md (original!) → merge fresh
# Result: deterministic, same output every time</div>

<h4>Personal SOUL Sync-Back</h4>
<p>The entrypoint.sh watchdog syncs workspace back to S3 every 60 seconds, but <strong>intentionally excludes</strong>:</p>
<div class="code">--exclude "SOUL.md"                  # Don't overwrite assembled version with S3 personal
--exclude ".personal_soul_backup.md" # Protect the anti-snowball backup
--exclude "AGENTS.md"                # Assembly-only file
--exclude "IDENTITY.md"              # Generated at assembly time
--exclude "knowledge/*"              # Position KB, not personal</div>
<p><strong>What IS synced back:</strong> USER.md, MEMORY.md, HEARTBEAT.md, memory/*.md (conversation history)</p>

<h4>When Admin Changes SOUL</h4>
<table class="tbl">
<tr><th>Action</th><th>Storage</th><th>Propagation</th><th>Latency</th></tr>
<tr><td>Edit Global SOUL</td><td>S3 _shared/soul/global/</td><td>bump_config_version() → DDB CONFIG#global-version → agents poll every 5 min → cache evict → re-assemble</td><td>≤5 min</td></tr>
<tr><td>Edit Position SOUL</td><td>S3 _shared/soul/positions/{pos}/</td><td>Same config version bump mechanism</td><td>≤5 min</td></tr>
<tr><td>Edit Personal SOUL (Portal)</td><td>S3 {emp_id}/workspace/SOUL.md direct write</td><td>Session stop → next session re-assembles from S3</td><td>Immediate (next session)</td></tr>
</table>

<h4>DynamoDB Records Involved</h4>
<table class="tbl">
<tr><th>Record</th><th>Key</th><th>Purpose</th></tr>
<tr><td>Config Version</td><td>SK=CONFIG#global-version</td><td>Cache invalidation trigger for running agents</td></tr>
<tr><td>Employee</td><td>SK=EMP#{emp_id}</td><td>positionId → determines which position SOUL to load</td></tr>
<tr><td>IM Mapping</td><td>SK=MAPPING#{ch}__{uid}</td><td>Feishu OU ID → emp_id resolution for SOUL lookup</td></tr>
<tr><td>KB Assignments</td><td>SK=CONFIG#kb-assignments</td><td>Which KBs to inject at end of SOUL.md</td></tr>
<tr><td>Session</td><td>SK=SESSION#{tenant_id}</td><td>Stores soulHash for admin monitoring</td></tr>
</table>

<h4>Post-Assembly Injections (server.py)</h4>
<p>After merge_soul(), server.py appends additional blocks to SOUL.md:</p>
<div class="code">1. Plan A (permissions):  "&lt;!-- PLAN A --&gt; Allowed tools: web_search, file. MUST NOT use: shell..."
2. Knowledge Bases:     "&lt;!-- KNOWLEDGE BASES --&gt; You have access to: kb-policies, kb-arch..."
3. Org Directory:       "&lt;!-- COMPANY DIRECTORY --&gt; (inline employee list)"
4. Language preference:  "&lt;!-- LANGUAGE --&gt; Always respond in Chinese..."</div>

<h4>⚠️ Known Design Gaps</h4>
<ul style="color:var(--warn);font-size:12px">
<li>Position-specific changes evict ALL agent caches (not just the affected position). Could add POS#{pos_id}:version for targeted refresh.</li>
<li>If .personal_soul_backup.md is accidentally deleted, snowball cycle restarts.</li>
<li>USER.md edits are separate from SOUL merge — USER.md is read by OpenClaw as context, not merged into SOUL.md.</li>
</ul>`,
`
<h4>S3 存储结构</h4>
<div class="code">s3://{bucket}/
├── _shared/soul/global/SOUL.md          ← 第 1 层：全局（IT 锁定）
├── _shared/soul/positions/{pos_id}/SOUL.md  ← 第 2 层：岗位
└── {emp_id}/workspace/SOUL.md           ← 第 3 层：个人
    └── .personal_soul_backup.md         ← 防雪球备份</div>

<h4>组装代码：workspace_assembler.py → merge_soul()</h4>
<p>OpenClaw 只读取一个文件：<code>SOUL.md</code>。我们通过 HTML 注释标记和 <code>---</code> 分隔符拼接三层生成：</p>
<div class="code">&lt;!-- LAYER: GLOBAL --&gt;
**关键身份覆盖：你是 ACME 公司的数字员工...**
{全局 SOUL}

---

&lt;!-- LAYER: POSITION --&gt;
{岗位 SOUL}

---

&lt;!-- LAYER: PERSONAL --&gt;
{个人 SOUL}</div>

<h4>防雪球机制：.personal_soul_backup.md</h4>
<p><strong>问题：</strong>不保护的话，第 2 次组装会读取已合并的 SOUL.md 作为"个人"层，导致指数增长。</p>
<p><strong>方案：</strong>首次组装时保存原始个人 SOUL 到 <code>.personal_soul_backup.md</code>。后续组装读取备份，不读合并版。</p>

<h4>个人 SOUL 同步回写</h4>
<p>watchdog 每 60 秒同步，但<strong>刻意排除</strong> SOUL.md（防止覆盖组装版本）。回写的是：USER.md、MEMORY.md、HEARTBEAT.md、memory/*.md。</p>

<h4>管理员修改 SOUL 的传播</h4>
<table class="tbl">
<tr><th>操作</th><th>存储</th><th>传播机制</th><th>延迟</th></tr>
<tr><td>全局 SOUL</td><td>S3</td><td>config version bump → 5 分钟轮询 → 缓存清除</td><td>≤5 分钟</td></tr>
<tr><td>岗位 SOUL</td><td>S3</td><td>同上</td><td>≤5 分钟</td></tr>
<tr><td>个人 SOUL</td><td>S3 直写</td><td>会话停止 → 下次重新组装</td><td>即时</td></tr>
</table>

<h4>⚠️ 已知设计缺口</h4>
<ul style="color:var(--warn);font-size:12px">
<li>岗位变更会清除所有 Agent 缓存（不仅仅是受影响的岗位）</li>
<li>如果 .personal_soul_backup.md 被意外删除，雪球循环重启</li>
<li>USER.md 编辑与 SOUL 合并分离 — USER.md 作为上下文被 OpenClaw 读取，不合并到 SOUL.md</li>
</ul>
`); }},

sec: { en:{title:'Security Center',sub:'Defense in depth — 4 independent layers.'}, zh:{title:'安全中心',sub:'纵深防御 — 4 层独立防护。'}, body(){ return intent('SOUL says what agents <strong>should</strong> do. Security enforces what they <strong>can</strong> do. 4 layers: L1 SOUL (prompt rules), L2 Permission (tool allowlist), L3 Guardrail (Bedrock filtering), L4 Runtime (isolated VM). Bank vault: lock + alarm + guard.','SOUL 说明 Agent <strong>应该</strong>做什么。安全强制执行 Agent <strong>能</strong>做什么。4 层：L1 SOUL（提示规则）、L2 Permission（工具白名单）、L3 Guardrail（Bedrock 过滤）、L4 Runtime（隔离 VM）。银行保险库：锁 + 警报 + 保安。')
    + card(t('Defense Layers','防护层次'),['L4','Runtime','Isolated Firecracker microVM','var(--primary)','L3','Guardrail','Bedrock content filtering','var(--cyan)','L2','Permission','Tool allowlist per position','var(--success)','L1','SOUL','Prompt-level rules','var(--warn)'].reduce((a,_,i,arr)=>i%4===0?a+`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px"><span style="color:${arr[i+3]};font-weight:700;width:28px">${arr[i]}</span><span style="font-weight:600;min-width:90px">${arr[i+1]}</span><span style="color:var(--text-m)">${arr[i+2]}</span></div>`:a,'')); }},

// ═══ HELPER FUNCTIONS ═══
function t(en, zh) { return lang === 'en' ? en : zh; }

function intent(en, zh) {
  return `<div class="intent" onclick="this.classList.toggle('closed')"><div class="intent-head">💡 ${t('Design Intent','设计意图')}</div><div class="intent-body">${t(en,zh)}</div></div>`;
}

function sectionHead(text) {
  return `<div class="section-head">${text}</div>`;
}

function card(title, body) {
  return `<div class="card"><div class="card-head">${title}</div><div class="card-body">${body}</div></div>`;
}

function note(type, icon, text) {
  return `<div class="note ${type}"><span class="note-icon">${icon}</span><div class="note-text">${text}</div></div>`;
}

function flow(items) {
  let html = '<div class="flow">';
  for (let i = 0; i < items.length; i += 2) {
    const text = items[i], cls = items[i+1] || '';
    if (text === '') continue;
    if (i > 0 && items[i-1] !== '') html += '<span class="flow-arrow">→</span>';
    html += `<div class="flow-node ${cls}">${text.replace(/\n/g,'<br>')}</div>`;
  }
  return html + '</div>';
}

function deep(en, zh) {
  return `<div class="deep" onclick="this.classList.toggle('open')"><div class="deep-head">🔬 ${t('Technical Deep Dive','技术深潜')}</div><div class="deep-body">${t(en,zh)}</div></div>`;
}

function steps(title, items) {
  const list = Array.isArray(items) ? items : [items];
  return `<div class="steps"><div style="font-size:13px;font-weight:600;margin-bottom:8px">${title}</div>${list.map((s,i)=>`<div class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></div>`).join('')}</div>`;
}

// ═══ RENDER ═══
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === (l==='en'?'EN':'中文')));
  render();
}

function navigate(id) {
  activePage = id;
  render();
  document.getElementById('main').scrollTop = 0;
}

function render() {
  // Rail
  let railHtml = '';
  NAV.forEach(g => {
    railHtml += `<div class="rail-group"><div class="rail-label">${g.group[lang]}</div>`;
    g.items.forEach(item => {
      railHtml += `<div class="rail-item ${item.id===activePage?'active':''}" onclick="navigate('${item.id}')"><span class="rail-icon">${item.icon}</span><span class="rail-text">${item[lang]}</span></div>`;
    });
    railHtml += '</div>';
  });
  document.getElementById('rail').innerHTML = railHtml;

  // Content
  const page = PAGES[activePage];
  if (!page) return;
  const info = page[lang] || page.en;
  document.getElementById('main').innerHTML = `<div class="page active"><div class="page-title">${info.title}</div><div class="page-sub">${info.sub}</div>${page.body()}</div>`;
}

render();
</script>
